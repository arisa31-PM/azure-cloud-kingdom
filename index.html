<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azureクラウド王国</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header class="header">
  <h1>🏰 Azureクラウド王国</h1>
  <p>Azureを学んで王国を発展させよう</p>
</header>

<main>

<section class="status">
  <h2 id="level">Lv.1 クラウド見習い</h2>
  <p id="exp">EXP 0 / 100</p>
</section>

<section class="kingdom">

  <div class="building is-locked" id="storage-building">
    📦 倉庫
  </div>

  <div class="building is-locked" id="sql-building">
    🗄 図書館
  </div>

  <div class="building is-locked" id="app-building">
    🏰 ギルド
  </div>

</section>

<section class="quests">

  <button data-exp="30" data-target="storage-building">
    Storageを学習した
  </button>

  <button data-exp="40" data-target="sql-building">
    SQLを学習した
  </button>

  <button data-exp="50" data-target="app-building">
    App Serviceを学習した
  </button>

</section>

</main>

<script src="./js/script.js"></script>

</body>
</html>
